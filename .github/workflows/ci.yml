name: CI (Test + SCA + SBOM)

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "banner/**"
      - "**.md"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "banner/**"
      - "**.md"
  workflow_dispatch:

# Set default permissions to read-only for security
permissions:
  contents: read

jobs:
  test:
    name: Run Rust Tests & Audits
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Run unit and integration tests
        run: cargo test

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run linter (clippy)
        run: cargo clippy --all-targets -- -D warnings

  trivy:
    name: Trivy scan & SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Required to upload SARIF results to Code Scanning

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.3.1
        with:
          version: v0.70.0
          cache: true

      - name: Run Trivy vulnerability scanner
        run: |
          # Fails the build if CRITICAL or HIGH vulnerabilities are found
          trivy fs --scanners vuln --severity CRITICAL,HIGH --exit-code 1 .

      - name: Generate Trivy SARIF report
        if: always()
        run: |
          trivy fs --format sarif --output trivy-results.sarif --scanners vuln .

      - name: Upload Trivy scan results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate CycloneDX SBOM
        run: |
          trivy fs -f cyclonedx -o sbom.cyclonedx.json .

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
