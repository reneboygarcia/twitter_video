name: CI (Test + SCA + SBOM)

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "banner/**"
      - "**.md"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "banner/**"
      - "**.md"
  workflow_dispatch:

# Set default permissions to read-only for security
permissions:
  contents: read

jobs:
  test:
    name: Run Python Tests & Audits
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests -v

      - name: Run style & type audits
        run: |
          flake8 src/ tests/
          mypy src/

  trivy:
    name: Trivy scan & SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Required to upload SARIF results to Code Scanning

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.70.0
          cache: true

      - name: Run Trivy vulnerability scanner
        run: |
          # Fails the build if CRITICAL or HIGH vulnerabilities are found
          trivy fs --scanners vuln --severity CRITICAL,HIGH --exit-code 1 .

      - name: Generate Trivy SARIF report
        if: always()
        run: |
          trivy fs --format sarif --output trivy-results.sarif --scanners vuln .

      - name: Upload Trivy scan results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate CycloneDX SBOM
        run: |
          trivy fs -f cyclonedx -o sbom.cyclonedx.json .

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
